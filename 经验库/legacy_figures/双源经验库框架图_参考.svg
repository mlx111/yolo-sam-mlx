<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2454b8"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6b7280"/>
    </marker>
    <linearGradient id="memGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7d6"/>
      <stop offset="100%" stop-color="#f6c343"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#d8e8ff"/>
    </linearGradient>
    <style>
      .title { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #111827; }
      .section { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 25px; font-weight: 700; fill: #123b8c; }
      .label { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 20px; font-weight: 600; fill: #111827; }
      .small { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 17px; fill: #263238; }
      .tiny { font-family: "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 15px; fill: #374151; }
      .white { fill: #ffffff; }
      .box { fill: #ffffff; stroke: #2454b8; stroke-width: 2.4; rx: 18; ry: 18; }
      .soft { fill: url(#blueGrad); stroke: #2454b8; stroke-width: 2.2; rx: 16; ry: 16; }
      .memory { fill: url(#memGrad); stroke: #b7791f; stroke-width: 3; rx: 22; ry: 22; }
      .dark { fill: #1f4eaa; stroke: #123b8c; stroke-width: 2.2; rx: 14; ry: 14; }
      .green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 13; ry: 13; }
      .red { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 13; ry: 13; }
      .gray { fill: #f3f4f6; stroke: #6b7280; stroke-width: 2; rx: 13; ry: 13; }
      .arrow { stroke: #2454b8; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .arrow2 { stroke: #6b7280; stroke-width: 2.2; fill: none; marker-end: url(#arrowGray); stroke-dasharray: 8 7; }
      .thick { stroke-width: 4.2; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#fbfdff"/>
  <text x="800" y="52" text-anchor="middle" class="title">面向异常恢复的双源经验库框架</text>
  <text x="800" y="84" text-anchor="middle" class="tiny">重点：经验如何获取、如何结构化保存、如何反向服务 VLM 决策与 sim-real gap 校准</text>

  <!-- Left: inputs -->
  <rect x="45" y="125" width="280" height="700" class="box"/>
  <text x="185" y="168" text-anchor="middle" class="section">多模态输入</text>
  <rect x="70" y="200" width="230" height="92" class="soft"/>
  <text x="88" y="231" class="label">技能与动作空间</text>
  <text x="88" y="258" class="tiny">技能库 / 技能约束</text>
  <text x="88" y="280" class="tiny">技能执行状态</text>
  <rect x="70" y="318" width="230" height="98" class="soft"/>
  <text x="88" y="350" class="label">任务上下文</text>
  <text x="88" y="377" class="tiny">总体任务 / 当前子任务</text>
  <text x="88" y="399" class="tiny">成功条件 / task_stage</text>
  <rect x="70" y="442" width="230" height="104" class="soft"/>
  <text x="88" y="474" class="label">历史动作与反馈</text>
  <text x="88" y="501" class="tiny">已执行动作序列</text>
  <text x="88" y="523" class="tiny">异常动作 / 失败原因</text>
  <rect x="70" y="575" width="230" height="76" class="red"/>
  <text x="185" y="620" text-anchor="middle" class="label">异常现场图像</text>
  <rect x="85" y="680" width="200" height="105" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="185" y="736" text-anchor="middle" class="tiny">RGB / Depth / Mask</text>

  <!-- VLM -->
  <rect x="380" y="125" width="310" height="250" class="box"/>
  <text x="535" y="168" text-anchor="middle" class="section">VLM 异常处理规划</text>
  <rect x="415" y="205" width="240" height="68" class="dark"/>
  <text x="535" y="233" text-anchor="middle" class="label white">生成恢复任务序列</text>
  <text x="535" y="258" text-anchor="middle" class="tiny white">skill_sequence / 参数 / 约束</text>
  <rect x="415" y="300" width="240" height="50" class="gray"/>
  <text x="535" y="331" text-anchor="middle" class="label">规则与图像检查</text>

  <!-- Memory core -->
  <rect x="455" y="430" width="590" height="355" class="memory"/>
  <text x="750" y="475" text-anchor="middle" class="section" fill="#8a4b00">双源经验库 MemoryV3+</text>
  <text x="750" y="504" text-anchor="middle" class="tiny">中心模块：不是只保存日志，而是参与检索、评估、校准和复用</text>

  <rect x="485" y="535" width="250" height="95" class="soft"/>
  <text x="610" y="565" text-anchor="middle" class="label">经验条目结构</text>
  <text x="505" y="594" class="tiny">task_stage / skill_sequence</text>
  <text x="505" y="616" class="tiny">failure_reason / keyframes</text>

  <rect x="765" y="535" width="250" height="95" class="soft"/>
  <text x="890" y="565" text-anchor="middle" class="label">执行与传感器证据</text>
  <text x="785" y="594" class="tiny">execution_feedback</text>
  <text x="785" y="616" class="tiny">sensor_summary / raw_refs</text>

  <rect x="485" y="655" width="250" height="95" class="green"/>
  <text x="610" y="685" text-anchor="middle" class="label">双源来源</text>
  <text x="505" y="714" class="tiny">simulation experience</text>
  <text x="505" y="736" class="tiny">real / pseudo-real experience</text>

  <rect x="765" y="655" width="250" height="95" class="green"/>
  <text x="890" y="685" text-anchor="middle" class="label">检索与使用</text>
  <text x="785" y="714" class="tiny">相似异常检索 / 方案复用</text>
  <text x="785" y="736" class="tiny">失败风险提示 / candidate scoring</text>

  <!-- Sim validation -->
  <rect x="1110" y="120" width="390" height="330" class="box"/>
  <text x="1305" y="162" text-anchor="middle" class="section">仿真验证</text>
  <rect x="1160" y="205" width="290" height="55" class="dark"/>
  <text x="1305" y="240" text-anchor="middle" class="label white">解析并执行技能序列</text>
  <rect x="1160" y="285" width="290" height="55" class="green"/>
  <text x="1305" y="320" text-anchor="middle" class="label">采集仿真图像与日志</text>
  <rect x="1160" y="365" width="290" height="55" class="gray"/>
  <text x="1305" y="400" text-anchor="middle" class="label">生成 simulation experience</text>

  <!-- Real validation -->
  <rect x="1110" y="535" width="390" height="300" class="box"/>
  <text x="1305" y="577" text-anchor="middle" class="section">真机 / 伪真机验证</text>
  <rect x="1160" y="620" width="290" height="55" class="dark"/>
  <text x="1305" y="655" text-anchor="middle" class="label white">在真实系统执行方案</text>
  <rect x="1160" y="700" width="290" height="55" class="green"/>
  <text x="1305" y="735" text-anchor="middle" class="label">采集图像、日志、传感器摘要</text>
  <rect x="1160" y="780" width="290" height="55" class="gray"/>
  <text x="1305" y="815" text-anchor="middle" class="label">生成 real experience</text>

  <!-- Environment construction compressed -->
  <rect x="720" y="125" width="330" height="250" class="box"/>
  <text x="885" y="168" text-anchor="middle" class="section">支撑：环境构建</text>
  <rect x="760" y="215" width="250" height="58" class="green"/>
  <text x="885" y="250" text-anchor="middle" class="label">感知驱动重建</text>
  <text x="885" y="302" text-anchor="middle" class="tiny">Grounded-SAM / 点云补全</text>
  <text x="885" y="327" text-anchor="middle" class="tiny">位姿估计 / 环境生成</text>
  <text x="885" y="352" text-anchor="middle" class="tiny">压缩为支撑模块，避免抢主线</text>

  <!-- Gap and critic -->
  <rect x="505" y="845" width="520" height="95" class="box"/>
  <text x="765" y="878" text-anchor="middle" class="section">真机反馈校准与 Sim-Real Gap</text>
  <text x="535" y="910" class="tiny">pose_gap / contact_gap / perception_gap / actuation_gap / robot_state_gap</text>
  <text x="535" y="932" class="tiny">更新经验可信度，区分可迁移成功方案与仿真失效方案</text>

  <!-- Arrows -->
  <path d="M325,250 C350,250 360,240 380,240" class="arrow thick"/>
  <path d="M690,240 C705,240 705,240 720,240" class="arrow"/>
  <path d="M690,250 C860,250 900,205 1110,230" class="arrow"/>
  <path d="M535,375 C535,392 565,405 610,430" class="arrow thick"/>
  <path d="M1045,600 C1080,540 1085,410 1110,392" class="arrow thick"/>
  <path d="M1110,392 C1065,430 1060,465 1045,520" class="arrow thick"/>
  <path d="M1110,807 C1080,807 1070,745 1045,720" class="arrow thick"/>
  <path d="M1045,745 C1065,810 1035,845 1000,875" class="arrow"/>
  <path d="M765,845 C765,820 765,805 765,785" class="arrow thick"/>
  <path d="M765,430 C765,395 700,355 655,325" class="arrow"/>
  <path d="M765,430 C830,395 895,390 960,375" class="arrow2"/>
  <path d="M1025,892 C1120,892 1240,850 1305,835" class="arrow2"/>

  <!-- annotations -->
  <rect x="1095" y="462" width="420" height="48" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="10" ry="10"/>
  <text x="1305" y="492" text-anchor="middle" class="tiny">仿真与真机都以结构化经验写入 MemoryV3+，而不是只保存结果</text>
  <rect x="365" y="805" width="250" height="48" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="10" ry="10"/>
  <text x="490" y="835" text-anchor="middle" class="tiny">经验库回流 VLM：检索、复用、风险提示</text>
</svg>
